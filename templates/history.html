<!DOCTYPE html>

<html>

<head>
<title>Regex History</title>
</head>

<body>

<nav>
<a href="/">Home</a> |
<a href="/generator">Generator</a> |
<a href="/validator">Validator</a> |
<a href="/history">History</a> |
<a href="/dashboard">Dashboard</a>
</nav>

<hr>

<h1>Regex History</h1>

<table border="1">

<tr>
<th>ID</th>
<th>Language Rule</th>
<th>Generated Regex</th>
<th>String</th>
<th>Result</th>
<th>Date</th>
</tr>

{% for row in records %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
