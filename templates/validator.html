{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card p-4 shadow">

                <h2 class="text-center mb-4">
                    String Validator
                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Regular Expression
                        </label>

                        <input
                            type="text"
                            name="regex"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Test String
                        </label>

                        <input
                            type="text"
                            name="test_string"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Validate

                    </button>

                </form>

                {% if result %}

                <hr>

                <h4>Validation Result</h4>

                {% if result == "VALID" %}

                <div class="alert alert-success">

                    {{ result }}

                </div>

                {% else %}

                <div class="alert alert-danger">

                    {{ result }}

                </div>

                {% endif %}

                {% endif %}

            </div>

        </div>

    </div>

</div>

{% endblock %}
