<!DOCTYPE html>
<html>
<head>
    <title>Regex Validator</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>
<nav>

<a href="/">Home</a> |

<a href="/generator">Generator</a> |

<a href="/validator">Validator</a> |

<a href="/history">History</a> |

<a href="/dashboard">Dashboard</a>

</nav>

<hr>

<body>

<nav>
    <div class="logo">RegexGen</div>
</nav>

<div class="hero">

    <h1>Regex Validator</h1>

    <form method="POST">

        <input
        type="text"
        name="regex"
        placeholder="Enter Regex"
        required>

        <br><br>

        <input
        type="text"
        name="test_string"
        placeholder="Enter String"
        required>

        <br><br>

        <button type="submit">
            Validate
        </button>

    </form>

    <br>

    {% if result %}

        <h2>Validation Result</h2>

        <h3>{{ result }}</h3>

    {% endif %}

</div>

</body>
</html>
